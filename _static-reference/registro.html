<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — VÉRTICE CUBE</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#F6F7F9; --ink-2:#FFFFFF; --chalk:#0B2036; --chalk-dim:#5B6472;
    --signal:#FE6601; --turf:#002F59; --turf-light:#0A3E68; --steel:#4A5568;
    --line: rgba(0,47,89,0.12); --line-strong: rgba(0,47,89,0.22);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ink);color:var(--chalk);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important;}}
  .display{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-0.01em;}
  .mono{font-family:'JetBrains Mono',monospace;letter-spacing:.02em;}

  nav{border-bottom:1px solid var(--line);}
  nav .wrap{max-width:1180px;margin:0 auto;padding:0 32px;display:flex;align-items:center;height:76px;}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-mark{height:38px;width:auto;display:block;}
  .logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;letter-spacing:-0.01em;color:var(--chalk);}
  .logo-text span{color:var(--signal);}

  .stage{
    min-height:calc(100vh - 77px);display:flex;align-items:center;justify-content:center;
    padding:56px 24px;position:relative;overflow:hidden;
  }
  .stage-hex{position:absolute;pointer-events:none;}
  .stage-hex.s1{top:-120px;left:-140px;width:480px;height:480px;opacity:.5;}
  .stage-hex.s2{bottom:-160px;right:-120px;width:400px;height:400px;opacity:.3;}

  .authcard{
    width:100%;max-width:420px;position:relative;z-index:2;
    background:var(--ink-2);border:1px solid var(--line);border-radius:8px;
    padding:36px;opacity:0;animation:fadeUp .5s ease forwards;
    box-shadow:0 24px 48px rgba(0,47,89,0.1);
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  .tabs{display:flex;gap:2px;background:var(--ink);border:1px solid var(--line-strong);border-radius:3px;padding:2px;margin-bottom:28px;}
  .tab{flex:1;text-align:center;background:transparent;border:none;color:var(--chalk-dim);font-size:13px;font-weight:600;padding:9px;border-radius:2px;cursor:pointer;transition:background .15s ease,color .15s ease;}
  .tab.active{background:var(--signal);color:var(--ink);}

  h1.authtitle{font-size:24px;margin-bottom:6px;}
  .authcard > p.sub{font-size:13px;color:var(--chalk-dim);margin-bottom:26px;}

  .role-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
  .role-card{
    border:1px solid var(--line-strong);border-radius:4px;padding:16px 14px;cursor:pointer;
    transition:border-color .15s ease,background .15s ease;position:relative;
  }
  .role-card input{position:absolute;opacity:0;pointer-events:none;}
  .role-card .r-icon{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--chalk-dim);margin-bottom:10px;display:block;}
  .role-card h4{font-size:13px;margin-bottom:4px;}
  .role-card p{font-size:11px;color:var(--chalk-dim);line-height:1.5;}
  .role-card:hover{border-color:var(--chalk-dim);}
  .role-card.checked{border-color:var(--signal);background:rgba(254,102,1,.06);}
  .role-card.checked .r-icon{color:var(--signal);}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
  .field label{font-size:12px;color:var(--chalk-dim);}
  .field input{
    background:var(--ink);border:1px solid var(--line-strong);color:var(--chalk);
    padding:12px 13px;border-radius:3px;font-size:14px;font-family:'Inter',sans-serif;
    transition:border-color .15s ease;
  }
  .field input:focus{outline:none;border-color:var(--signal);}

  .terms{display:flex;align-items:flex-start;gap:9px;font-size:12px;color:var(--chalk-dim);margin-bottom:22px;line-height:1.5;}
  .terms input{margin-top:2px;accent-color:var(--signal);}
  .terms a{color:var(--turf-light);text-decoration:none;}

  .btn-primary{
    width:100%;background:var(--signal);color:var(--ink);font-weight:700;padding:14px;border-radius:3px;
    border:none;font-size:14px;cursor:pointer;transition:background .18s ease,transform .18s ease;
  }
  .btn-primary:hover{background:#FF7C24;transform:translateY(-1px);}

  .divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--chalk-dim);font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}

  .foot-note{text-align:center;font-size:12px;color:var(--chalk-dim);margin-top:20px;}
  .foot-note a{color:var(--chalk);text-decoration:none;font-weight:600;}
</style>
</head>
<body>

<nav><div class="wrap">
  <a href="index.html" class="logo">
    <img src="logo-mark.png" alt="Vértice Cube" class="logo-mark">
    <span class="logo-text">VÉRTICE<span> CUBE</span></span>
  </a>
</div></nav>

<div class="stage">
  <svg class="stage-hex s1" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <polygon points="200,20 350,105 350,295 200,380 50,295 50,105" fill="none" stroke="var(--turf)" stroke-width="2"/>
    <polygon points="200,70 310,132 310,268 200,330 90,268 90,132" fill="none" stroke="var(--signal)" stroke-width="2"/>
  </svg>
  <svg class="stage-hex s2" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <polygon points="200,20 350,105 350,295 200,380 50,295 50,105" fill="none" stroke="var(--turf)" stroke-width="1.5"/>
  </svg>

  <div class="authcard">
    <div class="tabs">
      <button class="tab active" data-tab="crear">Crear cuenta</button>
      <button class="tab" data-tab="entrar">Iniciar sesión</button>
    </div>

    <div id="panel-crear">
      <h1 class="authtitle display">Sumate a Vértice Cube</h1>
      <p class="sub">Elegí cómo vas a usar tu cuenta. Podés cambiarlo después.</p>

      <div class="role-select">
        <label class="role-card checked" id="role-comprador">
          <input type="radio" name="role" value="comprador" checked>
          <span class="r-icon">↓</span>
          <h4>Comprar diseños</h4>
          <p>Descargar diseños gratis y comprar los premium</p>
        </label>
        <label class="role-card" id="role-vendedor">
          <input type="radio" name="role" value="vendedor">
          <span class="r-icon">↑</span>
          <h4>Vender diseños</h4>
          <p>Subir tus kits y cobrar por cada descarga</p>
        </label>
      </div>

      <div class="field">
        <label for="nombre">Nombre completo</label>
        <input id="nombre" type="text" placeholder="Martina Duarte">
      </div>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" placeholder="nombre@correo.com">
      </div>
      <div class="field">
        <label for="pass">Contraseña</label>
        <input id="pass" type="password" placeholder="Mínimo 8 caracteres">
      </div>

      <label class="terms">
        <input type="checkbox">
        Acepto los <a href="#">Términos de uso</a> y la <a href="#">Política de privacidad</a> de VÉRTICE CUBE
      </label>

      <button class="btn-primary">Crear cuenta →</button>

      <div class="divider">o continuar con</div>
      <button class="btn-primary" style="background:transparent;border:1px solid var(--line-strong);color:var(--chalk);">Continuar con Google</button>

      <p class="foot-note">¿Ya tenés cuenta? <a href="#" data-switch="entrar">Iniciar sesión</a></p>
    </div>

    <div id="panel-entrar" style="display:none;">
      <h1 class="authtitle display">Bienvenido de nuevo</h1>
      <p class="sub">Iniciá sesión para seguir comprando o vendiendo diseños.</p>

      <div class="field">
        <label for="email2">Correo electrónico</label>
        <input id="email2" type="email" placeholder="nombre@correo.com">
      </div>
      <div class="field">
        <label for="pass2">Contraseña</label>
        <input id="pass2" type="password" placeholder="Tu contraseña">
      </div>

      <p class="foot-note" style="margin:0 0 20px;text-align:right;"><a href="#">¿Olvidaste tu contraseña?</a></p>

      <button class="btn-primary">Iniciar sesión →</button>

      <div class="divider">o continuar con</div>
      <button class="btn-primary" style="background:transparent;border:1px solid var(--line-strong);color:var(--chalk);">Continuar con Google</button>

      <p class="foot-note">¿No tenés cuenta? <a href="#" data-switch="crear">Crear una</a></p>
    </div>
  </div>
</div>

<script>
  const tabs = document.querySelectorAll('.tab');
  const panelCrear = document.getElementById('panel-crear');
  const panelEntrar = document.getElementById('panel-entrar');

  function setTab(name){
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    panelCrear.style.display = name === 'crear' ? 'block' : 'none';
    panelEntrar.style.display = name === 'entrar' ? 'block' : 'none';
  }
  tabs.forEach(t => t.addEventListener('click', () => setTab(t.dataset.tab)));
  document.querySelectorAll('[data-switch]').forEach(a=>{
    a.addEventListener('click', e=>{e.preventDefault();setTab(a.dataset.switch);});
  });

  const roleCards = document.querySelectorAll('.role-card');
  roleCards.forEach(card=>{
    card.addEventListener('click', ()=>{
      roleCards.forEach(c=>c.classList.remove('checked'));
      card.classList.add('checked');
      card.querySelector('input').checked = true;
    });
  });
</script>
</body>
</html>
